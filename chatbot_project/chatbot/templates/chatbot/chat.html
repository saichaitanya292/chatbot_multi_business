<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #343541;
            margin: 0;
        }

        #chat-container {
            width: 100%;
            max-width: 600px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #444654;
            color: white;
            align-self: flex-start;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #40414f;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px;
            border: none;
            background: #19c37d;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a36a;
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chatbox"></div>

    <div id="inputArea">
        <input id="message" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function addMessage(text, className) {
    let div = document.createElement("div");
    div.className = "message " + className;
    div.innerText = text;

    let chatbox = document.getElementById("chatbox");
    chatbox.appendChild(div);

    // Auto scroll
    chatbox.scrollTop = chatbox.scrollHeight;
}

function sendMessage() {
    let input = document.getElementById("message");
    let msg = input.value.trim();

    if (msg === "") return;

    addMessage(msg, "user");

    fetch("/api/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        addMessage(data.bot || data.response || "No response from bot", "bot");
    });

    input.value = "";
}

// Enter key support
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
